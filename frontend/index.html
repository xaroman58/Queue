<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Queue MVP - Cyber 1v1 Edition</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700;900&display=swap');

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #08080c; color: #f0f0f5; 
            font-family: 'Rajdhani', sans-serif; overflow: hidden; touch-action: none; 
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(10, 10, 16, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 152, 0, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 152, 0, 0.6); }
        
        #landing-page {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #151525 0%, #050508 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center; padding: 20px; box-sizing: border-box;
        }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 4rem; font-weight: 900; color: #ff9800; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 6px; text-shadow: 0 0 10px rgba(255, 152, 0, 0.5), 0 0 30px rgba(255, 152, 0, 0.2); }
        .description { max-width: 600px; font-size: 1.3rem; color: #8f90a6; margin-bottom: 40px; line-height: 1.6; font-weight: 500; }
        #google-login-wrapper { background: rgba(10, 10, 16, 0.6); padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 152, 0, 0.25); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        #game-container { display: none; width: 100%; height: 100%; position: relative; }
        #gameCanvas { position: absolute; top: 0; left: 0; z-index: 1; cursor: grab; }
        #gameCanvas:active { cursor: grabbing; }
        
        /* HUD Layout Redesign (Mobile Friendly) */
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        
        /* Top Section: Banner */
        #top-hud { width: 100%; display: flex; justify-content: center; padding-top: 15px; }
        #leader-banner { background: rgba(255, 152, 0, 0.1); border: 1px solid rgba(255, 152, 0, 0.5); padding: 12px 30px; border-radius: 12px; text-align: center; opacity: 0; transition: all 0.4s; pointer-events: auto; backdrop-filter: blur(8px); max-width: 85%; transform: translateY(-20px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #leader-banner.active { opacity: 1; transform: translateY(0); }
        .banner-title { display: block; font-size: 11px; color: #ff9800; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; font-weight: 700; }
        #leader-text { font-size: 22px; font-weight: 700; color: #fff; word-wrap: break-word; }

        /* Bottom Section: Chat & Input */
        #bottom-hud { width: 100%; pointer-events: auto; background: rgba(10, 10, 16, 0.9); border-top: 1px solid rgba(255, 152, 0, 0.3); backdrop-filter: blur(12px); box-shadow: 0 -10px 30px rgba(0,0,0,0.5); padding: 15px; box-sizing: border-box; }
        
        #hud-info { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto 10px auto; }
        #status { font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: 700; color: #ff9800; }
        #timer-box { font-family: 'Orbitron', sans-serif; font-size: 16px; color: #ff5252; font-weight: 700; }
        
        #input-area { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; }
        input { flex: 1; padding: 12px; background: rgba(20, 20, 30, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; border-radius: 6px; font-size: 16px; font-family: 'Rajdhani', sans-serif; font-weight: 700; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff9800; }
        input:disabled { background: #1a1a24; border-color: #ff5252; color: #555; }
        
        button { padding: 12px 24px; background: #ff9800; border: none; color: #08080c; font-family: 'Orbitron', sans-serif; font-weight: 900; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; letter-spacing: 1px; white-space: nowrap; }
        button:hover { background: #ffb74d; }
        button:disabled { background: #444; color: #222; cursor: not-allowed; }
        .btn-sec { background: transparent; color: #4caf50; border: 1px solid rgba(76, 175, 80, 0.5); }
        .btn-sec:hover { background: rgba(76, 175, 80, 0.1); }

        #system-logs { position: absolute; bottom: 100px; left: 15px; width: 280px; max-height: 140px; overflow-y: auto; font-size: 13px; pointer-events: auto; display: flex; flex-direction: column; gap: 4px; background: rgba(10, 10, 16, 0.7); padding: 10px; border-radius: 8px; border: 1px solid rgba(255, 152, 0, 0.1); backdrop-filter: blur(4px); }
        .log-sys { color: #8a8a9d; font-style: italic; }
        .log-msg { color: #e0e0e5; }
        .log-blur { color: #444453; filter: blur(2px); }

        /* --- PLAYER ACTION MENU --- */
        #player-menu { display: none; position: absolute; background: rgba(15, 15, 25, 0.95); border: 1px solid #ff9800; border-radius: 8px; padding: 10px; box-shadow: 0 0 20px rgba(255, 152, 0, 0.3); z-index: 50; flex-direction: column; gap: 8px; pointer-events: auto; min-width: 150px; }
        .menu-title { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #aaa; text-align: center; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 2px; }
        .action-btn { background: #1a1a2a; border: 1px solid #333; color: #fff; padding: 8px; text-align: center; font-size: 12px; cursor: pointer; border-radius: 4px; font-family: 'Orbitron', sans-serif; transition: 0.2s; }
        .action-btn:hover { background: #2a2a3a; border-color: #ff9800; color: #ff9800; }
        .btn-danger:hover { border-color: #ff5252; color: #ff5252; }

        /* --- DUEL UI --- */
        #duel-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; justify-content: center; align-items: center; flex-direction: column; backdrop-filter: blur(10px); pointer-events: auto; }
        #duel-title { font-family: 'Orbitron', sans-serif; color: #ff5252; font-size: 2rem; margin-bottom: 10px; text-shadow: 0 0 15px rgba(255,82,82,0.6); }
        #duel-word { font-family: 'Rajdhani', sans-serif; font-size: 4rem; font-weight: 900; color: #fff; letter-spacing: 5px; margin-bottom: 30px; user-select: none; }
        #duel-input { font-size: 24px; padding: 15px; text-align: center; max-width: 400px; background: rgba(255, 255, 255, 0.1); border: 2px solid #ff9800; }

        @media (max-width: 600px) {
            #input-area { flex-wrap: wrap; }
            input { min-width: 100%; margin-bottom: 5px; }
            button { flex: 1; }
            #leader-text { font-size: 16px; }
            #system-logs { width: 160px; max-height: 80px; font-size: 10px; bottom: 120px; left: 5px; padding: 5px; }
            #duel-word { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div id="landing-page">
    <h1>Queue</h1>
    <div class="description">
        Tysiące graczy. Zabezpiecz pozycję. Wyzywaj innych na pojedynki (1v1) o wyższe miejsce. Lider ma tylko jeden strzał, żeby przemówić do tłumu.
    </div>
    <div id="google-login-wrapper">
        <div id="g_id_onload" data-client_id="183677470650-jbppkcnbnfs9fj8kmi2jjgo917l97s2k.apps.googleusercontent.com" data-callback="handleGoogleLogin" data-auto_prompt="false"></div>
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="filled_black" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
    </div>
</div>

<!-- DUEL OVERLAY -->
<div id="duel-overlay">
    <div id="duel-title">SZYBKIE PISANIE 1v1!</div>
    <div style="color:#aaa; font-size:1.2rem; margin-bottom: 5px;">Przepisz to słowo najszybciej jak potrafisz:</div>
    <div id="duel-word">ŁADOWANIE...</div>
    <input type="text" id="duel-input" placeholder="Wpisz tu..." autocomplete="off" />
</div>

<!-- GAME CONTAINER -->
<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div id="player-menu">
        <div class="menu-title" id="pm-name">Gracz</div>
        <div id="pm-actions"></div>
    </div>

    <div id="hud">
        <div id="top-hud">
            <div id="leader-banner">
                <span class="banner-title">Lider krzyczy do tłumu:</span>
                <div id="leader-text">...</div>
            </div>
        </div>
        
        <div id="system-logs"></div>

        <div id="bottom-hud">
            <div id="hud-info">
                <div id="status">Connecting...</div>
                <div id="timer-box"></div>
            </div>
            <div id="input-area">
                <input type="text" id="msg-input" placeholder="Type a message..." />
                <button id="send-btn">Wyślij</button>
                <button id="center-btn" class="btn-sec">Centruj</button>
            </div>
        </div>
    </div>
</div>

<script>
    function decodeJwtResponse(token) {
        let base64Url = token.split('.')[1];
        let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        let jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function handleGoogleLogin(response) {
        const responsePayload = decodeJwtResponse(response.credential);
        const playerFirstName = responsePayload.given_name || responsePayload.name;
        document.getElementById('landing-page').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        initGameEngine(playerFirstName);
    }

    // HUD Elements
    const statusDiv = document.getElementById('status');
    const timerBox = document.getElementById('timer-box');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const centerBtn = document.getElementById('center-btn');
    const leaderBanner = document.getElementById('leader-banner');
    const leaderText = document.getElementById('leader-text');
    const systemLogs = document.getElementById('system-logs');
    const playerMenu = document.getElementById('player-menu');
    const pmActions = document.getElementById('pm-actions');
    const pmName = document.getElementById('pm-name');
    
    // Duel Elements
    const duelOverlay = document.getElementById('duel-overlay');
    const duelWord = document.getElementById('duel-word');
    const duelInput = document.getElementById('duel-input');

    function initGameEngine(playerName) {
        let myPosition = 0;
        let totalInQueue = 0;
        let activeBubbles = {};
        let ws;
        
        // const wsUrl = `wss://twoj-backend.onrender.com/?name=${encodeURIComponent(playerName)}`;
        const wsUrl = `ws://localhost:3000/?name=${encodeURIComponent(playerName)}`;
        ws = new WebSocket(wsUrl); 
        
        ws.onopen = () => { statusDiv.innerText = 'Połączono!'; };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            
            if (data.type === 'WELCOME') { logSystem(`Zalogowano: ${data.username}`, 'sys'); }
            
            if (data.type === 'QUEUE_UPDATE') {
                myPosition = data.position;
                totalInQueue = data.total;
                statusDiv.innerText = `Pozycja: ${myPosition} / ${totalInQueue}`;
                timerBox.innerText = data.timeLeft !== undefined && totalInQueue > 0 ? `Czas lidera: ${data.timeLeft}s` : '';
                
                if (myPosition === 1) {
                    if (data.isLeaderMuted) {
                        msgInput.placeholder = "Wykorzystałeś swoją 1 wiadomość!";
                        msgInput.disabled = true;
                        sendBtn.disabled = true;
                    } else {
                        msgInput.placeholder = "Krzycz do tłumu! (TYLKO 1 WIADOMOŚĆ)";
                        msgInput.maxLength = 60;
                        msgInput.disabled = false;
                        sendBtn.disabled = false;
                    }
                } else {
                    msgInput.placeholder = "Szeptaj do sąsiadów...";
                    msgInput.maxLength = 120;
                    msgInput.disabled = false;
                    sendBtn.disabled = false;
                }
            }
            
            if (data.type === 'CHAT_MSG') {
                if (data.system) {
                    logSystem(data.text, 'sys');
                } else {
                    if (data.isGlobal) {
                        leaderText.innerText = data.text;
                        leaderBanner.classList.add('active');
                        logSystem(`[GLOBAL] ${data.sender}: ${data.text}`, 'msg');
                    } else if (data.position) {
                        const isReadable = Math.abs(myPosition - data.position) <= 1;
                        activeBubbles[data.position] = { text: data.text, isReadable: isReadable, expires: Date.now() + 4000 };
                        if (isReadable) logSystem(`${data.sender}: ${data.text}`, 'msg');
                        else logSystem(`${data.sender} szepcze...`, 'blur');
                    }
                }
            }

            if (data.type === 'CLEAR_BANNER') { leaderBanner.classList.remove('active'); }
            if (data.type === 'KICKED') { logSystem(`[KICK] ${data.reason}`, 'sys'); }

            // --- MINIGRA EVENTS ---
            if (data.type === 'DUEL_START') {
                playerMenu.style.display = 'none';
                duelOverlay.style.display = 'flex';
                duelWord.innerText = data.word;
                duelInput.value = '';
                duelInput.focus();
                logSystem(`Rozpoczęto pojedynek 1v1 z ${data.opponent}!`, 'sys');
            }

            if (data.type === 'DUEL_END') {
                duelOverlay.style.display = 'none';
            }
        };

        const send = () => {
            if (msgInput.disabled) return;
            const text = msgInput.value.trim();
            if (!text) return;
            ws.send(JSON.stringify({ type: 'CHAT_MSG', text }));
            msgInput.value = '';
        };

        sendBtn.onclick = send;
        msgInput.onkeypress = (e) => { if (e.key === 'Enter') send(); };

        duelInput.oninput = () => {
            ws.send(JSON.stringify({ type: 'DUEL_ANSWER', answer: duelInput.value.trim() }));
        };

        function logSystem(text, type) {
            if (!systemLogs) return;
            const p = document.createElement('div');
            p.className = type === 'sys' ? 'log-sys' : (type === 'blur' ? 'log-blur' : 'log-msg');
            p.innerText = text;
            systemLogs.appendChild(p);
            systemLogs.scrollTop = systemLogs.scrollHeight;
        }

        // --- CANVAS RENDERING & INTERAKCJE ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        const PLAYER_SPACING = 60; 
        const WALL_X = window.innerWidth > 600 ? 260 : 140;
        
        let cameraX = 0; 
        let isDragging = false;
        let lastMouseX = 0;
        let cameraLockedOnPlayer = true;

        const particles = [];
        for (let i = 0; i < 40; i++) {
            particles.push({
                x: Math.random() * window.innerWidth * 2 - window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 2 + 0.5,
                speedY: -Math.random() * 0.4 - 0.1,
                alpha: Math.random() * 0.5 + 0.2
            });
        }

        const startDrag = (clientX) => { isDragging = true; lastMouseX = clientX; cameraLockedOnPlayer = false; playerMenu.style.display = 'none'; };
        const doDrag = (clientX) => { if (isDragging) { cameraX += (clientX - lastMouseX); lastMouseX = clientX; } };
        const stopDrag = () => { isDragging = false; };

        // Mechanika klikania w graczy
        canvas.addEventListener('mousedown', (e) => startDrag(e.clientX));
        window.addEventListener('mousemove', (e) => doDrag(e.clientX));
        window.addEventListener('mouseup', (e) => {
            stopDrag();
            if (e.target !== canvas) return;
            
            const floorY = canvas.height / 2 + 100;
            const clickWorldX = e.clientX - cameraX;
            const clickY = e.clientY;

            // Szukamy klikniętego gracza
            for (let i = 1; i <= totalInQueue; i++) {
                const pX = WALL_X - (i * PLAYER_SPACING);
                // Hitbox: X +/- 20px, Y od głowy do stóp (floorY - 60 do floorY)
                if (Math.abs(clickWorldX - pX) < 25 && clickY > floorY - 70 && clickY < floorY + 10) {
                    showPlayerMenu(i, e.clientX, e.clientY);
                    return;
                }
            }
            playerMenu.style.display = 'none';
        });

        canvas.addEventListener('touchstart', (e) => startDrag(e.touches[0].clientX), { passive: false });
        window.addEventListener('touchmove', (e) => doDrag(e.touches[0].clientX), { passive: false });
        window.addEventListener('touchend', stopDrag);

        centerBtn.onclick = () => { cameraLockedOnPlayer = true; playerMenu.style.display = 'none'; };

        function showPlayerMenu(targetIndex, screenX, screenY) {
            pmActions.innerHTML = '';
            
            if (targetIndex === myPosition) {
                pmName.innerText = "To Ty";
            } else {
                pmName.innerText = `Gracz #${targetIndex}`;
                
                // Opcja 1: Oddaj miejsce (tylko osobie +1)
                if (targetIndex === myPosition + 1) {
                    const btnGive = document.createElement('div');
                    btnGive.className = 'action-btn';
                    btnGive.innerText = "Oddaj miejsce (Swap)";
                    btnGive.onclick = () => { ws.send(JSON.stringify({ type: 'GIVE_PLACE' })); playerMenu.style.display = 'none'; };
                    pmActions.appendChild(btnGive);
                }
                
                // Opcja 2: Wyzwij na pojedynek (tylko osoba -1, z wykluczeniem lidera)
                if (targetIndex === myPosition - 1 && targetIndex > 1) {
                    const btnDuel = document.createElement('div');
                    btnDuel.className = 'action-btn btn-danger';
                    btnDuel.innerText = "⚔️ Wyzwij o pozycję (10s CD)";
                    btnDuel.onclick = () => { ws.send(JSON.stringify({ type: 'DUEL_CHALLENGE' })); playerMenu.style.display = 'none'; };
                    pmActions.appendChild(btnDuel);
                }

                if (pmActions.children.length === 0) {
                    const msg = document.createElement('div');
                    msg.style.fontSize = '10px';
                    msg.style.color = '#555';
                    msg.style.textAlign = 'center';
                    msg.innerText = "Brak dostępnych akcji";
                    pmActions.appendChild(msg);
                }
            }

            playerMenu.style.left = `${screenX + 15}px`;
            playerMenu.style.top = `${screenY - 30}px`;
            playerMenu.style.display = 'flex';
        }

        // --- ELEMENTY TŁA (Terminal i Banery AdSense) ---
        function drawFlatFloor(floorY) {
            ctx.save();
            const minX = WALL_X - (totalInQueue * PLAYER_SPACING) - 1000;
            const maxX = WALL_X + 500;
            const floorWidth = maxX - minX;

            ctx.fillStyle = '#0a0a10';
            ctx.fillRect(minX, floorY, floorWidth, canvas.height);

            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff9800';
            ctx.strokeStyle = 'rgba(255, 152, 0, 0.6)';
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(minX, floorY); ctx.lineTo(maxX, floorY); ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255, 152, 0, 0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(minX, floorY + 12); ctx.lineTo(maxX, floorY + 12); ctx.stroke();

            ctx.restore();
        }

        function drawAdsAndTerminal(floorY) {
            ctx.save();
            
            // BANERY ADSENSE (Miejsca na ścianie)
            const adWidth = 150;
            const adHeight = 200;
            const adY = floorY - adHeight - 20;

            for(let k = 1; k <= 3; k++) {
                const adX = WALL_X + 100 + (k * 180);
                
                // Szkielet Banera
                ctx.fillStyle = 'rgba(10, 10, 15, 0.5)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.fillRect(adX, adY, adWidth, adHeight);
                ctx.strokeRect(adX, adY, adWidth, adHeight);

                // Tekst Placeholder
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.font = 'bold 16px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText('AD SPACE', adX + adWidth/2, adY + adHeight/2);
            }

            // TERMINAL GŁÓWNY
            const pulse = Math.sin(Date.now() / 150) * 0.15 + 0.85;
            ctx.fillStyle = '#10101a';
            ctx.strokeStyle = 'rgba(255, 152, 0, 0.3)';
            ctx.lineWidth = 2;
            
            const tWidth = 60; const tHeight = 280;
            const tX = WALL_X; const tY = floorY - tHeight;
            
            ctx.fillRect(tX, tY, tWidth, tHeight); ctx.strokeRect(tX, tY, tWidth, tHeight);

            const scrX = tX + 8; const scrY = tY + 20;
            const scrW = tWidth - 16; const scrH = 80;

            ctx.fillStyle = '#050508'; ctx.strokeStyle = 'rgba(76, 175, 80, 0.4)';
            ctx.strokeRect(scrX, scrY, scrW, scrH); ctx.fillRect(scrX, scrY, scrW, scrH);

            ctx.shadowBlur = 10 * pulse; ctx.shadowColor = '#4caf50'; ctx.fillStyle = 'rgba(76, 175, 80, 0.85)';
            
            const waveY = scrY + 40 + Math.sin(Date.now() / 200) * 25;
            ctx.beginPath(); ctx.moveTo(scrX + 3, waveY); ctx.lineTo(scrX + scrW - 3, waveY);
            ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(76, 175, 80, 0.7)'; ctx.stroke();

            ctx.shadowBlur = 15 * pulse; ctx.shadowColor = '#ff9800'; ctx.strokeStyle = 'rgba(255, 152, 0, 0.9)'; ctx.lineWidth = 4 * pulse;
            ctx.beginPath(); ctx.moveTo(tX + tWidth / 2, tY + tHeight - 5); ctx.lineTo(tX + tWidth / 2, tY + scrH + 30); ctx.stroke();

            ctx.restore();
        }

        function drawStickman(x, y, isMe, isLeader, index) {
            ctx.save();
            let color = isLeader ? '#ff9800' : (isMe ? '#4caf50' : '#4d4d66');
            
            ctx.strokeStyle = color; ctx.lineWidth = isMe ? 3.5 : 2; ctx.lineCap = 'round';

            if (isMe || isLeader) { ctx.shadowBlur = 10; ctx.shadowColor = color; }

            const bouncePhase = Date.now() / 250 + index;
            const bodyOffset = Math.sin(bouncePhase) * 2; const kneeOffset = Math.sin(bouncePhase) * 1;

            const footLeftX = x - 8; const footRightX = x + 4; const footY = y;
            const pelvisX = x - 2; const pelvisY = y - 12 + kneeOffset;
            const neckX = x; const neckY = y - 32 + bodyOffset;
            const headX = x + 3; const headY = y - 44 + bodyOffset;

            ctx.beginPath(); ctx.moveTo(pelvisX, pelvisY); ctx.lineTo(x - 6, pelvisY + (footY - pelvisY)/2); ctx.lineTo(footLeftX, footY);
            ctx.moveTo(pelvisX, pelvisY); ctx.lineTo(x + 2, pelvisY + (footY - pelvisY)/2); ctx.lineTo(footRightX, footY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(pelvisX, pelvisY); ctx.lineTo(neckX, neckY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(neckX, neckY + 3); ctx.lineTo(x - 4, neckY + 16); ctx.moveTo(neckX, neckY + 3); ctx.lineTo(x + 6, neckY + 16); ctx.stroke();
            ctx.beginPath(); ctx.arc(headX, headY, 8, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = isMe ? '#4caf50' : (isLeader ? '#ff9800' : '#5c5c70'); 
            ctx.font = 'bold 11px Orbitron, sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(isMe ? 'YOU' : `#${index}`, x, y + 22);

            const bubble = activeBubbles[index];
            if (bubble && bubble.expires > Date.now()) {
                ctx.font = '700 13px Rajdhani, sans-serif';
                const textWidth = ctx.measureText(bubble.text).width;
                const bubbleWidth = Math.max(textWidth + 20, 40);
                const bubbleHeight = 28;
                const bX = x - bubbleWidth / 2;
                const bY = headY - 40 - ((index % 3) * 34);

                ctx.fillStyle = 'rgba(10, 10, 16, 0.95)'; ctx.strokeStyle = isMe ? '#4caf50' : '#4d4d66'; ctx.lineWidth = 1.5;
                ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(bX, bY, bubbleWidth, bubbleHeight, 8); else ctx.rect(bX, bY, bubbleWidth, bubbleHeight);
                ctx.fill(); ctx.stroke();

                ctx.beginPath(); ctx.moveTo(x, headY - 12); ctx.lineTo(x, bY + bubbleHeight);
                ctx.strokeStyle = isMe ? 'rgba(76, 175, 80, 0.4)' : 'rgba(255, 255, 255, 0.15)'; ctx.lineWidth = 1; ctx.stroke();

                ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
                if (!bubble.isReadable) { ctx.filter = 'blur(4px)'; ctx.globalAlpha = 0.4; }
                ctx.fillText(bubble.text, x, bY + 18);
                ctx.filter = 'none'; ctx.globalAlpha = 1.0;
            }
            ctx.restore();
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save(); ctx.fillStyle = '#ff9800';
            particles.forEach(p => {
                p.y += p.speedY; const particleX = p.x + (cameraX * 0.15); 
                if (p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width * 2 - cameraX * 0.15; }
                ctx.globalAlpha = p.alpha; ctx.beginPath(); ctx.arc(particleX, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.restore();

            if (cameraLockedOnPlayer) {
                const myWorldX = WALL_X - (myPosition * PLAYER_SPACING);
                const targetCameraX = (canvas.width / 2) - myWorldX;
                cameraX += (targetCameraX - cameraX) * 0.08;
            }

            ctx.save(); ctx.translate(cameraX, 0);
            const floorY = canvas.height / 2 + 100;

            drawFlatFloor(floorY);
            drawAdsAndTerminal(floorY);
            
            for (let i = 1; i <= totalInQueue; i++) {
                const playerX = WALL_X - (i * PLAYER_SPACING);
                const screenX = playerX + cameraX;
                if (screenX > -100 && screenX < canvas.width + 100) {
                    drawStickman(playerX, floorY, i === myPosition, i === 1, i);
                }
            }

            ctx.restore();
            requestAnimationFrame(render);
        }
        requestAnimationFrame(render);
    }
</script>
</body>
